mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: true
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# дЄЇйШ≤ж≠ҐдљњзФ®жПТдїґжЬЛеПЛйБЗеИ∞йЭҐжЭњйЧЃйҐШпЉМжИСж≥®йЗКжОЙдЇЖж≠§ж®°еЭЧгАВ
#external-controller: 0.0.0.0:9090
#secret: ""
#external-ui: ui
#external-ui-name: zashboard
#external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# еЧЕжОҐпЉИfakeipдЄЛеЕґеЃЮеПѓдї•дЄНзФ®еЧЕжОҐпЉЙ
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# еЕ•зЂЩ
tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
#дљњзФ®nikkiпЉМжЈЈеЕ•еЕ®йГ®дЄНдњЃжФєзЪДжГЕеЖµпЉМеЉАеРѓжО•еП£жМЗеЃЪдЄЇnikki
